<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>JaLL Walkthrough</title>

  <!-- Font moderno -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f1117;
      --card: rgba(255,255,255,0.05);
      --text: #e6e6e6;
      --accent: #7c5cff;
      --spoiler: #2a2d3a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1a1d2b, var(--bg));
      font-family: 'Inter', sans-serif;
      color: var(--text);
    }

    .card {
      width: 600px;
      max-width: 90%;
      padding: 24px;
      border-radius: 16px;
      background: var(--card);
      backdrop-filter: blur(12px);
      box-shadow:
        0 10px 30px rgba(0,0,0,0.4),
        0 0 40px rgba(124,92,255,0.1);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .title {
      font-weight: 600;
      font-size: 18px;
      margin-bottom: 12px;
      color: #ffffff;
    }

    #content {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 15px;
    }

    /* SPOILER */
    .spoiler {
      background: var(--spoiler);
      color: transparent;
      border-radius: 6px;
      padding: 2px 6px;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
      position: relative;
    }

    .spoiler::after {
      content: "";
      color: #999;
      font-size: 10px;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      letter-spacing: 0.5px;
    }

    .spoiler:hover {
      background: #3a3f55;
    }

    .spoiler.revealed {
      color: var(--text);
      background: transparent;
    }

    .spoiler.revealed::after {
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="title">🤖 Just a Little Longer walkthrough 🤖</div>
  <div id="content"></div>
</div>

<script>
  const rawText = `
Switch on the lights!
||You have to click on the switch to let switch on the lights||
🔥
||Power up the generator ||

||The generator uses steam to run||

||You need water to make steam, but it's leaking from the pipe||
||Maybe there's something to close the leaking pipe.||
||Use the valve handle to close the leaking pipe||

🪵
||You need something to boil that water||
||There's some wood near the generator||
||Drag the wood under the generator ||

||You need something to make some sparks||
||Pick the pointed stick near the workbench and drag it on the wood||

📄
||You need something that would catch fire.||
||There's a piece of paper on the console||

||A full sheet won't catch that easily.||
||Maybe if it was smaller...||
||Take the scissors on the workbench, drag them onto the paper in the inventory||
||Drag the shredded paper into the generator||

||YOU WILL START TO GENERATE STEAM NOW! LOOK AROUND FOR THE MACHINES MISSING POWER||

🧑‍💻
||The emergency hatch... is locked. Maybe someone knew how to open it.||
||If I were someone working here, where I would keep my notes?||
||Open the now powered console and read the logs.||
||Log 91722.01 talks about the BOUND CORE and how to make it||

💧
||The panel near the generator seems loose.||
||Click on the panel and it will reveal a puzzle.||
||Line up the pipes to find the SYNCHRONIZATION MODULE||

🔒
||There is a locked cabinet under the console. Maybe something precious is there||
||What are those symbols?||
||It's something related to fire, something related to a computer and something related to building?||
||There are numbers on the machines around||
||One on the generator (fire), one on the side of the console (computer), one on the assembly line (wrench)||
||The code is 7 3 9||
||You will find the OSCILLATION REGULATOR||

⛏️
||AETHER CHAMBER and SPRING are around the room||
||Now we can build the BOUND CORE... or not?||
||The BOUND CORE is something very difficult, how can I assemble it?||
||There's an Assembly Line around! But if you put all the items in it is telling there's not enough steam to assemble it.||
||The generator should generate more steam||
||Maybe increasing the heat?||
||There's coal nearby! But I can't take it with my bare hands...||
||Wonder if that HANDLE and that METAL SCRAPS could be useful||
||Craft the HANDLE and the METAL SCRAPS into the assembly line to get a PICKAXE||
||Now you can take the COAL from the COAL VEIN and use it into the COAL INPUT||

👾
||Now it's time to assemble the BOUND CORE!||
||You can use it in the console to open the emergency hatch... but will you do it.||


And that's all! ||Or is it? Sure there are a lot of floppy disks around.|| ||And whatever I choose... I'm not satisfied.|| ||Maybe there's another way?|| 
||There's a secret ending, but you won't find it in this walktrough 😈||


Hope you had fun!
  `;

  function parseSpoilers(text) {
    return text.replace(/\|\|(.*?)\|\|/g, (_, content) => {
      return `<span class="spoiler" onclick="this.classList.toggle('revealed')">${content}</span>`;
    });
  }

  document.getElementById("content").innerHTML = parseSpoilers(rawText);
</script>

</body>
</html>
